.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:opacity .25s,transform .25s;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateX(20px);}
.detail-screen{position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;display:flex;flex-direction:column;transition:opacity .25s;}
.detail-screen.hidden{opacity:0;pointer-events:none;}

/* TOPBAR */
.topbar{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none;}
.topbar-logo{width:50px;height:50px;object-fit:contain;border-radius:10px;background:white;padding:3px;flex-shrink:0;}
.topbar-titles small{font-size:10px;font-weight:600;color:var(--red);letter-spacing:2px;text-transform:uppercase;display:block;}
.topbar-titles h1{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;line-height:1.2;}
.topbar-titles h1 span{color:var(--red);}
.topbar-titles .brand{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase;margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:7px;}
.topbar-right-btn{width:38px;height:38px;border-radius:10px;background:#2a1a18;border:1.5px solid var(--red2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.lang-btn{background:#2a1a18;border:1.5px solid var(--red2);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text);font-size:14px;font-weight:500;}

/* SLIDESHOW */
.slideshow{flex-shrink:0;height:190px;position:relative;overflow:hidden;background:var(--bg3);}
@media(min-width:700px){.slideshow{height:240px;}}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .9s ease;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;}
.slide-emoji-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;background:var(--bg3);}
.slide-caption{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;background:linear-gradient(transparent,rgba(0,0,0,0.82));}
.slide-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#fff;}
.slide-price{font-size:13px;font-weight:600;color:var(--gold);margin-top:2px;}
.slide-dots{position:absolute;bottom:10px;right:14px;display:flex;gap:5px;}
.slide-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.35);transition:background .3s;}
.slide-dot.active{background:#fff;}
.slide-badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.slide-badge.special{background:var(--red);color:#fff;}
.slide-badge.popular{background:var(--gold);color:#111;}

/* SEARCH */
.search-wrap{padding:8px 16px;flex-shrink:0;}
.search-box{background:var(--bg3);border-radius:13px;display:flex;align-items:center;padding:11px 15px;gap:10px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;width:100%;}
.search-box input::placeholder{color:var(--text3);}

/* CATS */
.cats-wrap{padding:6px 16px;flex-shrink:0;}
.cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:8px 15px;border-radius:30px;background:var(--pill);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;border:1.5px solid transparent;transition:all .2s;white-space:nowrap;}
.cat-pill.active{background:var(--red);color:#fff;border-color:var(--red);}

/* GRID */
.menu-grid{flex:1;overflow-y:auto;padding:10px 12px 80px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent;}
.grid-inner{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(min-width:700px){.grid-inner{grid-template-columns:1fr 1fr 1fr;}}
@media(min-width:1000px){.grid-inner{grid-template-columns:1fr 1fr 1fr 1fr;}}

/* FOOD CARD */
.food-card{background:var(--card);border-radius:15px;overflow:hidden;cursor:pointer;transition:transform .15s;}
.food-card:active{transform:scale(0.97);}
.food-card-img-wrap{position:relative;}
.food-card-img{width:100%;aspect-ratio:4/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.food-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.card-badge{position:absolute;top:7px;left:7px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;z-index:2;}
.card-badge.special{background:var(--red);color:#fff;}
.card-badge.popular{background:var(--gold);color:#111;}
.food-card-body{padding:10px 11px 10px;}
.food-card-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3;}
.food-card-desc{font-size:11px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:9px;}
.food-card-footer{display:flex;align-items:center;justify-content:space-between;}
.food-price{font-size:14px;font-weight:700;color:var(--gold);}
.food-arrow{width:28px;height:28px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;}
body.text-lg .food-card-name{font-size:17px;}body.text-lg .food-card-desc{font-size:13px;}body.text-lg .food-price{font-size:17px;}
body.text-xl .food-card-name{font-size:20px;}body.text-xl .food-card-desc{font-size:15px;}body.text-xl .food-price{font-size:20px;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 0 14px;cursor:pointer;gap:4px;color:var(--text3);font-size:12px;font-weight:500;transition:color .2s;}
.nav-item.active{color:var(--red);}
.nav-item svg{width:22px;height:22px;}

/* DETAIL */
.detail-img-wrap{position:relative;flex-shrink:0;}
.detail-img{width:100%;height:360px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:90px;overflow:hidden;}
.detail-img img{width:100%;height:100%;object-fit:cover;}
.detail-back{position:absolute;top:16px;left:14px;width:38px;height:38px;background:rgba(0,0,0,0.55);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.detail-back svg{width:20px;height:20px;color:#fff;}
.detail-body{padding:22px 22px 50px;}
.detail-cat{display:inline-flex;align-items:center;gap:5px;background:rgba(232,67,45,0.15);color:var(--red);font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;margin-bottom:12px;}
.detail-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:8px;line-height:1.2;}
.detail-price{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.detail-div{height:1px;background:var(--border);margin:12px 0;}
.detail-desc{font-size:15px;color:var(--text2);line-height:1.7;}
body.text-lg .detail-name{font-size:30px;}body.text-lg .detail-price{font-size:26px;}body.text-lg .detail-desc{font-size:17px;}
body.text-xl .detail-name{font-size:34px;}body.text-xl .detail-price{font-size:29px;}body.text-xl .detail-desc{font-size:19px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:#2a2a2a;border-radius:20px;width:300px;overflow:hidden;}
.modal-title{font-size:16px;font-weight:600;text-align:center;padding:18px;border-bottom:1px solid var(--border);}
.lang-opt{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;}
.lang-opt+.lang-opt{border-top:1px solid var(--border);}
.lang-opt.sel{background:rgba(232,67,45,0.1);}
.lang-opt-left{display:flex;align-items:center;gap:11px;font-size:15px;}
.lang-opt-left.sel{color:var(--red);font-weight:600;}
.chk{width:22px;height:22px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.chk svg{width:12px;height:12px;color:#fff;}

/* PIN */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.pin-overlay.open{opacity:1;pointer-events:all;}
.pin-box{background:#242424;border-radius:22px;width:310px;padding:24px 20px;}
.pin-lock-icon{width:52px;height:52px;background:rgba(232,67,45,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.pin-lock-icon svg{width:26px;height:26px;color:var(--red);}
.pin-title{font-size:17px;font-weight:600;text-align:center;margin-bottom:3px;}
.pin-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:16px;}
.pin-dots{display:flex;justify-content:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.pin-dot{width:11px;height:11px;border-radius:50%;background:var(--border);transition:background .2s;}
.pin-err{text-align:center;color:var(--red);font-size:13px;min-height:20px;margin-bottom:10px;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.pin-key{background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:20px;font-weight:600;font-family:'DM Sans',sans-serif;height:60px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;}
.pin-key:active{background:var(--red);color:#fff;}
.pin-key.sm{font-size:13px;}

/* ADMIN */
.admin-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.admin-header-left{display:flex;align-items:center;gap:11px;}
.back-btn-circle{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.back-btn-circle svg{width:18px;height:18px;color:var(--text2);}
.admin-h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}
.add-btn{background:var(--red);color:#fff;border:none;border-radius:11px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;}
.admin-body{flex:1;overflow-y:auto;padding:14px;}
.settings-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;}
.settings-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:13px;}
.settings-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.settings-row{display:flex;gap:7px;}
.s-btn{flex:1;padding:10px 4px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s;}
.s-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
.s-divider{height:1px;background:var(--border);margin:13px 0;}
.cat-pills-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.cat-mgmt-pill{display:flex;align-items:center;gap:5px;background:var(--bg3);border-radius:20px;padding:6px 8px 6px 12px;font-size:13px;font-weight:500;color:var(--text);}
.cat-del-btn{width:18px;height:18px;background:rgba(232,67,45,0.18);border-radius:50%;border:none;cursor:pointer;color:var(--red);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;}
.cat-add-row{display:flex;gap:7px;}
.cat-emoji-inp{width:50px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 6px;color:var(--text);font-size:18px;text-align:center;outline:none;font-family:inherit;}
.cat-name-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
.cat-name-inp:focus,.cat-emoji-inp:focus{border-color:var(--red);}
.cat-add-action{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.admin-list{margin-top:4px;}
.admin-item{background:var(--card);border-radius:13px;display:flex;align-items:center;gap:12px;padding:11px;margin-bottom:9px;}
.admin-item-img{width:58px;height:58px;border-radius:9px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;}
.admin-item-img img{width:100%;height:100%;object-fit:cover;}
.admin-item-info{flex:1;min-width:0;}
.admin-item-name{font-size:14px;font-weight:600;color:var(--text);}
.admin-item-cat{font-size:12px;color:var(--text2);margin-top:2px;}
.admin-item-price{font-size:13px;font-weight:700;color:var(--gold);margin-top:3px;}
.admin-actions{display:flex;gap:7px;}
.edit-btn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.del-btn{width:34px;height:34px;border-radius:8px;background:rgba(232,67,45,0.14);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.edit-btn svg{width:15px;height:15px;color:var(--text2);}
.del-btn svg{width:15px;height:15px;color:var(--red);}

/* FORM */
.form-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.form-back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text2);font-size:15px;font-family:inherit;}
.form-back-btn svg{width:18px;height:18px;}
.form-screen-title{font-size:17px;font-weight:600;color:var(--text);}
.save-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.form-body{flex:1;overflow-y:auto;padding:18px;}
.img-preview-area{background:var(--bg3);border-radius:14px;height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);margin-bottom:12px;overflow:hidden;cursor:pointer;}
.img-preview-area img{width:100%;height:100%;object-fit:cover;border-radius:14px;}
.img-preview-area svg{width:38px;height:38px;}
.img-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.img-btn{padding:11px;border-radius:11px;background:var(--bg3);border:none;color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;font-weight:500;}
.img-btn.red-icon{color:#ff6b4a;}
.img-btn.amber-icon{color:var(--gold);}
.f-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;margin-top:16px;display:block;}
.f-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px 15px;color:var(--text);font-size:15px;font-family:inherit;outline:none;}
.f-input:focus{border-color:var(--red);}
.f-input::placeholder{color:var(--text3);}
.f-textarea{min-height:85px;resize:vertical;}
.f-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px;}
.f-pill{padding:8px 14px;border-radius:20px;background:var(--pill);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.f-pill.active{background:var(--red);color:#fff;}

/* INSTALL BANNER */
#installBanner{display:none;position:fixed;bottom:68px;left:10px;right:10px;background:var(--card);border:1.5px solid var(--red);border-radius:15px;padding:13px 15px;align-items:center;gap:11px;z-index:150;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.ib-icon{width:40px;height:40px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ib-text{flex:1;}
.ib-title{font-size:14px;font-weight:600;color:var(--text);}
.ib-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.ib-install-btn{background:var(--red);color:#fff;border:none;border-radius:9px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.ib-close-btn{background:none;border:none;color:var(--text3);font-size:19px;cursor:pointer;padding:0 3px;}

/* EMPTY + TOAST */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--text3);gap:12px;}
.empty-state svg{width:44px;height:44px;}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(15px);background:#333;color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:500;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#fileInput{display:none;}
</style>
</head>
<body>

<!-- LANGUAGE MODAL -->
<div class="overlay" id="langModal">
  <div class="modal-box">
    <div class="modal-title" id="ml-title">Language</div>
    <div class="lang-opt" id="lo-en" onclick="setLang('en')">
      <div class="lang-opt-left" id="ll-en">&#127468;&#127463; English</div>
      <div id="lc-en"></div>
    </div>
    <div class="lang-opt" id="lo-am" onclick="setLang('am')">
      <div class="lang-opt-left" id="ll-am">&#127475;&#127481; &#4768;&#4635;&#4653;&#4669; (Amharic)</div>
      <div id="lc-am"></div>
    </div>
    <div class="lang-opt" id="lo-or" onclick="setLang('or')">
      <div class="lang-opt-left" id="ll-or">&#127475;&#127481; Afaan Oromoo</div>
      <div id="lc-or"></div>
    </div>
  </div>
</div>

<!-- PIN MODAL -->
<div class="pin-overlay" id="pinModal">
  <div class="pin-box">
    <div class="pin-lock-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <div class="pin-title">Admin Access</div>
    <div class="pin-sub">Enter PIN to continue</div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key sm" onclick="pinClear()">CLR</button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key sm" onclick="pinBack()">&#9003;</button>
    </div>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <div class="ib-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2v13M5 15l7 7 7-7"/><path d="M2 21h20"/></svg></div>
  <div class="ib-text"><div class="ib-title">Install Stormi Menu</div><div class="ib-sub">Add to home screen</div></div>
  <button class="ib-install-btn" onclick="installApp()">Install</button>
  <button class="ib-close-btn" onclick="document.getElementById('installBanner').style.display='none'">&#10005;</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*">

<!-- MENU SCREEN -->
<div class="screen" id="menuScreen">

// ============================================================
var CORRECT_PIN='1160601997';
function openPin(){
  pinEntry=''; updateDots();
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinModal').classList.add('open');
}
function pinPress(d){
  if(pinLocked||pinEntry.length>=10) return;
  pinEntry+=d; updateDots();
  if(pinEntry.length===10){
    setTimeout(function(){
      if(pinEntry===CORRECT_PIN){
        pinAttempts=0;
        document.getElementById('pinModal').classList.remove('open');
        showScreen('admin');
      } else {
        pinAttempts++;
        pinEntry=''; updateDots();
        if(pinAttempts>=3){
          pinLocked=true;
          var secs=30;
          document.getElementById('pinErr').textContent='Too many attempts. Wait 30s...';
          pinLockTmr=setInterval(function(){
            secs--;
            document.getElementById('pinErr').textContent='Too many attempts. Wait '+secs+'s...';
            if(secs<=0){ clearInterval(pinLockTmr); pinLocked=false; pinAttempts=0; document.getElementById('pinErr').textContent=''; }
          },1000);
        } else {
          document.getElementById('pinErr').textContent='Wrong PIN. '+(3-pinAttempts)+' attempts left.';
          setTimeout(function(){ document.getElementById('pinErr').textContent=''; },1500);
        }
      }
    },150);
  }
}
function pinBack(){ pinEntry=pinEntry.slice(0,-1); updateDots(); }
function pinClear(){ pinEntry=''; updateDots(); }
function updateDots(){
  var el=document.getElementById('pinDots');
  var html='';
  for(var i=0;i<10;i++){
    html+='<div class="pin-dot" style="background:'+(i<pinEntry.length?'var(--red)':'var(--border)')+'"></div>';
  }
  el.innerHTML=html;
}
document.getElementById('pinModal').addEventListener('click',function(e){
  if(e.target===this){ this.classList.remove('open'); pinEntry=''; updateDots(); }
});

// ============================================================
// SLIDESHOW
// ============================================================
function buildSlideshow(){
  var items=getItems();
  var el=document.getElementById('slideshow');
  if(!el||!items.length) return;
  var featured=items.slice(0,6);
  clearInterval(slideTimer);
  slideIdx=0;
  var html='';
  for(var i=0;i<featured.length;i++){
    var item=featured[i];
    var name=itemName(item);
    var imgHtml=item.img
      ?('<img src="'+item.img+'" alt="'+name+'">')
      :('<div class="slide-emoji-wrap">'+item.emoji+'</div>');
    var badgeHtml='';
    if(item.badge==='special') badgeHtml='<div class="slide-badge special">&#11088; Chef's Special</div>';
    else if(item.badge==='popular') badgeHtml='<div class="slide-badge popular">&#128293; Popular</div>';
    html+='<div class="slide'+(i===0?' active':'')+'" id="sl-'+i+'">'
      +imgHtml+badgeHtml
      +'<div class="slide-caption">'
      +'<div class="slide-name">'+name+'</div>'
      +'<div class="slide-price">ETB '+item.price+'</div>'
      +'</div></div>';
  }
  var dotsHtml='<div class="slide-dots">';
  for(var j=0;j<featured.length;j++){
    dotsHtml+='<div class="slide-dot'+(j===0?' active':'')+'" id="sd-'+j+'"></div>';
  }
  dotsHtml+='</div>';
  el.innerHTML=html+dotsHtml;
  var total=featured.length;
  slideTimer=setInterval(function(){
    var prev=slideIdx;
    slideIdx=(slideIdx+1)%total;
    var ps=document.getElementById('sl-'+prev);
    var ns=document.getElementById('sl-'+slideIdx);
    var pd=document.getElementById('sd-'+prev);
    var nd=document.getElementById('sd-'+slideIdx);
    if(ps) ps.classList.remove('active');
    if(ns) ns.classList.add('active');
    if(pd) pd.classList.remove('active');
    if(nd) nd.classList.add('active');
  },3500);
}

  }
  setBadge(formBadge);
  renderFormCatPills();
  showScreen('form');
}
function saveItem(){
  var nameEn=document.getElementById('f-nameEn').value.trim();
  if(!nameEn){ showToast('Please enter item name'); return; }
  var items=getItems();
  var cat=getCatById(formCat);
  var newItem={
    id:editingId||Date.now(), cat:formCat,
    price:parseFloat(document.getElementById('f-price').value)||0,
    img:formImg, emoji:cat?cat.icon:'🍽️', badge:formBadge,
    en:nameEn,
    am:document.getElementById('f-nameAm').value.trim(),
    or:document.getElementById('f-nameOr').value.trim(),
    den:document.getElementById('f-descEn').value.trim(),
    dam:document.getElementById('f-descAm').value.trim(),
    dor:document.getElementById('f-descOr').value.trim()
  };
  if(editingId){
    var idx=-1;
    for(var i=0;i<items.length;i++){ if(items[i].id===editingId){ idx=i; break; } }
    if(idx>=0) items[idx]=newItem; else items.push(newItem);
  } else {
    items.push(newItem);
  }
  saveItems(items);
  showToast('Saved!');
  showScreen('admin');
  buildSlideshow();
}
